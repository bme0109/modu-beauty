<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C6BC4"/>
      <stop offset="100%" style="stop-color:#A594E0"/>
    </linearGradient>
  </defs>
  <!-- 배경 라운드 사각형 -->
  <rect width="512" height="512" rx="120" ry="120" fill="url(#bg)"/>
  <!-- 브러시 손잡이 -->
  <rect x="236" y="60" width="40" height="160" rx="20" fill="rgba(255,255,255,0.95)"/>
  <!-- 브러시 헤드 -->
  <ellipse cx="256" cy="240" rx="58" ry="38" fill="white"/>
  <ellipse cx="256" cy="268" rx="42" ry="26" fill="rgba(255,255,255,0.75)"/>
  <!-- 스파클 좌상 -->
  <circle cx="110" cy="130" r="14" fill="rgba(255,255,255,0.8)"/>
  <line x1="110" y1="100" x2="110" y2="160" stroke="rgba(255,255,255,0.5)" stroke-width="8" stroke-linecap="round"/>
  <line x1="80" y1="130" x2="140" y2="130" stroke="rgba(255,255,255,0.5)" stroke-width="8" stroke-linecap="round"/>
  <!-- 스파클 우상 -->
  <circle cx="400" cy="110" r="10" fill="rgba(255,255,255,0.7)"/>
  <line x1="400" y1="85" x2="400" y2="135" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round"/>
  <line x1="375" y1="110" x2="425" y2="110" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round"/>
  <!-- 스파클 우하 -->
  <circle cx="410" cy="310" r="14" fill="rgba(255,255,255,0.75)"/>
  <line x1="410" y1="280" x2="410" y2="340" stroke="rgba(255,255,255,0.45)" stroke-width="8" stroke-linecap="round"/>
  <line x1="380" y1="310" x2="440" y2="310" stroke="rgba(255,255,255,0.45)" stroke-width="8" stroke-linecap="round"/>
  <!-- 하단 도트 -->
  <circle cx="180" cy="370" r="13" fill="rgba(255,255,255,0.55)"/>
  <circle cx="256" cy="390" r="16" fill="rgba(255,255,255,0.7)"/>
  <circle cx="332" cy="370" r="13" fill="rgba(255,255,255,0.55)"/>
  <!-- M 텍스트 -->
  <text x="256" y="480" 
    font-family="Georgia, serif" 
    font-size="90" 
    font-weight="bold"
    fill="rgba(255,255,255,0.9)"
    text-anchor="middle"
    letter-spacing="2">Modu</text>
</svg>
